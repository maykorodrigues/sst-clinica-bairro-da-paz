<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playbook Vivo SST Card — Histórico com Abas</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #2ECC71;
            --color-accent: #1987c3;
            --color-dark: #1a1a2e;
            --color-darker: #0f0f1e;
            --color-gray: #e0e0e0;
            --color-danger: #FF4757;
            --color-warning: #FFA502;
            --color-success: #2ECC71;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: linear-gradient(135deg, var(--color-darker) 0%, var(--color-dark) 100%);
            color: var(--color-gray);
            line-height: 1.6;
        }

        /* HEADER STICKY */
        header {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, var(--color-darker) 0%, rgba(25, 135, 195, 0.08) 100%);
            border-bottom: 3px solid var(--color-accent);
            padding: 15px 20px;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.4em;
            font-weight: 700;
            color: var(--color-primary);
        }

        .header-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 0.85em;
        }

        .header-links a {
            padding: 5px 10px;
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid var(--color-primary);
            color: var(--color-primary);
            text-decoration: none;
            border-radius: 3px;
            transition: all 0.2s;
        }

        .header-links a:hover {
            background: var(--color-primary);
            color: var(--color-darker);
        }

        /* ABAS */
        .tabs-container {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 10px 20px 0;
            border-bottom: 2px solid rgba(46, 204, 113, 0.2);
            scroll-behavior: smooth;
        }

        .tab-button {
            padding: 8px 16px;
            background: rgba(46, 204, 113, 0.05);
            border: 2px solid rgba(46, 204, 113, 0.3);
            color: var(--color-gray);
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
            border-radius: 4px 4px 0 0;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-button:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .tab-button.active {
            background: var(--color-primary);
            color: var(--color-darker);
            border-color: var(--color-primary);
        }

        /* CONTEÚDO DAS ABAS */
        .tabs-content {
            padding: 30px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .tab-pane {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        .tab-pane.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--color-accent);
        }

        .day-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.8em;
            font-weight: 700;
            color: var(--color-primary);
        }

        .day-status {
            font-size: 0.9em;
            padding: 5px 10px;
            background: rgba(255, 165, 2, 0.2);
            border: 1px solid var(--color-warning);
            color: var(--color-warning);
            border-radius: 3px;
        }

        .day-status.completed {
            background: rgba(46, 204, 113, 0.2);
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        /* SEÇÕES DO DIA */
        .section {
            margin: 25px 0;
            padding: 20px;
            background: rgba(25, 135, 195, 0.05);
            border-left: 4px solid var(--color-accent);
            border-radius: 4px;
        }

        .section h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.1em;
            color: var(--color-primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-planejado {
            border-left-color: var(--color-info);
        }

        .section-resultado {
            border-left-color: var(--color-success);
            background: rgba(46, 204, 113, 0.05);
        }

        .section-projecao {
            border-left-color: var(--color-warning);
            background: rgba(255, 165, 2, 0.05);
        }

        /* TABELAS */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 0.9em;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(46, 204, 113, 0.2);
        }

        th {
            background: rgba(46, 204, 113, 0.1);
            color: var(--color-primary);
            font-weight: 700;
        }

        tr:hover {
            background: rgba(25, 135, 195, 0.1);
        }

        /* CHECKBOXES */
        .task-list {
            list-style: none;
            margin: 15px 0;
        }

        .task-item {
            padding: 10px 15px;
            margin: 8px 0;
            background: rgba(46, 204, 113, 0.08);
            border-left: 3px solid var(--color-primary);
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 3px;
        }

        .task-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--color-primary);
        }

        .task-item input[type="checkbox"]:checked + label {
            text-decoration: line-through;
            color: rgba(224, 224, 224, 0.6);
        }

        .task-item label {
            cursor: pointer;
            flex: 1;
            margin: 0;
        }

        /* FOOTER */
        footer {
            background: rgba(0, 0, 0, 0.3);
            border-top: 2px solid var(--color-accent);
            padding: 20px;
            text-align: center;
            margin-top: 40px;
            font-size: 0.85em;
            color: rgba(224, 224, 224, 0.8);
        }

        footer a {
            color: var(--color-primary);
            text-decoration: none;
            border-bottom: 1px solid var(--color-primary);
        }

        footer a:hover {
            color: var(--color-accent);
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            .header-top {
                flex-direction: column;
                align-items: flex-start;
            }

            .day-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .tabs-container {
                padding: 10px 10px 0;
            }

            .tab-button {
                padding: 6px 12px;
                font-size: 0.85em;
            }
        }

        /* PRINT */
        @media print {
            header, .tabs-container {
                position: static;
            }

            .tab-button {
                border: 1px solid var(--color-gray);
                page-break-inside: avoid;
            }
        }
    </style>
</head>

            tabButton.textContent = day.label;
            tabButton.id = `tab-${day.date}`;
            tabButton.addEventListener('click', () => switchTab(day.date));
            tabsContainer.appendChild(tabButton);

            // Criar conteúdo da aba
            const tabPane = document.createElement('div');
            tabPane.className = 'tab-pane' + (index === 0 ? ' active' : '');
            tabPane.id = `pane-${day.date}`;

            const statusClass = day.status === 'completed' ? 'completed' : '';
            const statusText = day.status === 'completed' ? '✅ Concluído' : (day.status === 'in-progress' ? '🔄 Em Progresso' : '⏳ Planejado');

            tabPane.innerHTML = `

                </div>
            `;

            tabsContent.appendChild(tabPane);

        // Função para trocar abas
        function switchTab(date) {
            // Desativar todas as abas
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));

            // Ativar aba selecionada
            document.getElementById(`pane-${date}`).classList.add('active');
            document.getElementById(`tab-${date}`).classList.add('active');

            // Salvar em localStorage
            localStorage.setItem('activeTab', date);

            // Scroll para topo
            window.scrollTo(0, 0);
        }

        // Restaurar aba ativa
        const savedTab = localStorage.getItem('activeTab');
        if (savedTab) {
            switchTab(savedTab);
        }

        // Salvar checkboxes em localStorage
        document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
            const savedState = localStorage.getItem(`checkbox-${checkbox.id}`);
            if (savedState === 'true') {
                checkbox.checked = true;
            }

            checkbox.addEventListener('change', () => {
                localStorage.setItem(`checkbox-${checkbox.id}`, checkbox.checked);
            });
        });
